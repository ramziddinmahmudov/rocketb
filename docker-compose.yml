# ── Antigravity (Rocket Battle) — Docker Compose ──────

services:
  # ── PostgreSQL ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-antigravity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-antigravity}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-antigravity}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (FastAPI + Aiogram) ──────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      # Override DB and Redis URLs to use Docker service names
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-antigravity}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-antigravity}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (React + Nginx) ─────────────────────────
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     args:
  #       # The browser talks to the Nginx proxy, which forwards to backend
  #       VITE_API_BASE: ""
  #   restart: unless-stopped
  #   ports:
  #     - "81:80"
  #   depends_on:
  #     - backend

volumes:
  pgdata:
  redisdata:
