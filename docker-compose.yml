version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: rocket_battle_backend
    restart: always
    volumes:
      - ./backend/rocket_battle.db:/app/rocket_battle.db
      - ./backend/.env:/app/.env
    # We do not need to expose ports because nginx proxy will handle it
    # But if needed for debugging, we could map 8000:8000
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    container_name: rocket_battle_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
