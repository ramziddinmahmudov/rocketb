version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rocket_battle_db
    restart: always
    environment:
      POSTGRES_USER: rocketuser
      POSTGRES_PASSWORD: rocketpassword
      POSTGRES_DB: rocket_battle_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  backend:
    build:
      context: ./backend
    container_name: rocket_battle_backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://rocketuser:rocketpassword@db:5432/rocket_battle_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/.env:/app/.env
    expose:
      - "8000"
    depends_on:
      - db
      - redis

  bot:
    build:
      context: ./backend
    container_name: rocket_battle_bot
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://rocketuser:rocketpassword@db:5432/rocket_battle_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend/.env:/app/.env
    command: ["python", "-m", "app.bot"]
    depends_on:
      - db
      - backend

  redis:
    image: redis:7-alpine
    container_name: rocket_battle_redis
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  frontend:
    build:
      context: .
    container_name: rocket_battle_frontend
    restart: always
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: rocket_battle_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
